name: Deploy GitHub Pages for Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build site artifact
        run: make build

      - name: Verify build output
        run: |
          test -d dist
          test -f dist/index.html
          test -f dist/CNAME
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          test -f dist/blog/index.html
          test -f dist/personal-wiki/index.html
          test -f dist/papers/index.html
          test -f dist/work/hot-cross-buns.html
          grep -q '<urlset' dist/sitemap.xml
          ls -la dist | sed -n '1,40p'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
