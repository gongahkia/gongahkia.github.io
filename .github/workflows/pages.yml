name: Deploy GitHub Pages for Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site artifact
        run: python3 build.py --output "$GITHUB_WORKSPACE/dist"

      - name: Verify build output
        run: |
          test -d "$GITHUB_WORKSPACE/dist"
          test -f "$GITHUB_WORKSPACE/dist/index.html"
          test -f "$GITHUB_WORKSPACE/dist/CNAME"
          ls -la "$GITHUB_WORKSPACE/dist" | sed -n '1,40p'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
