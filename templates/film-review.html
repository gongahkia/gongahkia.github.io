{% extends "base.html" %}
{% block structured_data %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Review",
    "@id": {{ (canonical_url ~ "#review")|tojson }},
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": {{ canonical_url|tojson }}
    },
    "url": {{ canonical_url|tojson }},
    "headline": {{ (title ~ " (" ~ year ~ ")")|tojson }},
    "description": {{ meta_description|tojson }},
    "datePublished": {{ date_published|tojson }},
    "dateModified": {{ date_modified|tojson }},
    "author": {
      "@type": "Person",
      "@id": "https://gabrielongzm.com/#person",
      "name": "Gabriel Ong",
      "url": "https://gabrielongzm.com"
    },
    "itemReviewed": {
      "@type": "Movie",
      "name": {{ title|tojson }},
      "datePublished": {{ year|tojson }},
      "director": {
        "@type": "Person",
        "name": {{ director|tojson }}
      }
    },
    "reviewRating": {
      "@type": "Rating",
      "ratingValue": {{ rating|tojson }},
      "bestRating": "5",
      "worstRating": "0"
    }
  }
  </script>
{% endblock %}
{% block content %}
      <section class="film-details">
        <h2>{{ title }}</h2>
        <dl>
          <dt>Director</dt>
          <dd>{{ director }}</dd>
          <dt>Release Year</dt>
          <dd>{{ year }}</dd>
          <dt>Rating</dt>
          <dd>{{ rating }}/5</dd>
          <dt>Date</dt>
          <dd>{{ date }}</dd>
        </dl>
      </section>
      <section class="review-content">
        {{ content }}
      </section>
{% endblock %}
